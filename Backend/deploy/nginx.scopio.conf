# Nginx reverse proxy for Django (Gunicorn) + HTTPS termination

upstream scopio_gunicorn {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name 20.17.98.254.nip.io 20.17.98.254;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 20.17.98.254.nip.io 20.17.98.254;

    # Replace with your cert paths (e.g. Certbot)
    ssl_certificate /etc/letsencrypt/live/20.17.98.254.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/20.17.98.254.nip.io/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    location /static/ {
        alias /var/www/scopio/Backend/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /media/ {
        alias /var/www/scopio/storage/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}

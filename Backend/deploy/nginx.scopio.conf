# Nginx reverse proxy for Scopio
# Architecture: React SPA served at root; Django (Gunicorn) handles API + OAuth paths.
#
# IMPORTANT ordering rule: all Django proxy locations MUST appear before the
# React catch-all "location /" so that OAuth callbacks and API requests are
# never served to the React SPA.

upstream scopio_gunicorn {
    server 127.0.0.1:8000;
}

# Shared proxy header snippet (used by every Django proxy block)
# Nginx does not support include inside server{}, so headers are repeated per block.

server {
    listen 80;
    server_name scopio.in www.scopio.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name scopio.in www.scopio.in;

    ssl_certificate     /etc/letsencrypt/live/scopio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scopio.in/privkey.pem;

    client_max_body_size 25m;

    # ------------------------------------------------------------------
    # 1. Video stream  (must stay before /api/ so the regex takes priority)
    # ------------------------------------------------------------------
    location ~ ^/api/video/lessons/[0-9]+/stream/?$ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;

        proxy_buffering            off;
        proxy_request_buffering    off;
        proxy_max_temp_file_size   0;
    }

    # ------------------------------------------------------------------
    # 2. Django REST API
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
    }

    # ------------------------------------------------------------------
    # 3. django-allauth OAuth URLs  ← THE CRITICAL BLOCK
    #
    #    Google redirects the user's browser back to:
    #      /accounts/google/login/callback/?code=…&state=…
    #    This MUST reach Django-allauth, NOT the React SPA.
    #    Without this explicit block the request falls through to the
    #    React catch-all below, React Router finds no matching route,
    #    and the wildcard sends the user back to the login page.
    # ------------------------------------------------------------------
    location /accounts/ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
    }

    # ------------------------------------------------------------------
    # 4. Custom Google OAuth helper routes  (google_start / google_finalize)
    # ------------------------------------------------------------------
    location /glogin/ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
    }

    # ------------------------------------------------------------------
    # 5. Django admin
    # ------------------------------------------------------------------
    location /admin/ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
    }

    # ------------------------------------------------------------------
    # 6. DRF browsable-API login (used by developers / DRF auth endpoints)
    # ------------------------------------------------------------------
    location /api-auth/ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
    }

    # ------------------------------------------------------------------
    # 7. Django static files (admin CSS/JS, DRF assets)
    # ------------------------------------------------------------------
    location /static/ {
        alias /var/www/scopio/Backend/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ------------------------------------------------------------------
    # 8. Uploaded media
    # ------------------------------------------------------------------
    location /media/ {
        alias /var/www/scopio/storage/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ------------------------------------------------------------------
    # 9. React SPA catch-all  (MUST be last)
    #
    #    Serves the Vite build output for every URL that is NOT handled
    #    by the Django blocks above.  try_files falls back to index.html
    #    so React Router can handle client-side navigation.
    #
    #    Adjust the `root` path to match where `npm run build` outputs
    #    on your server (typically /var/www/scopio/frontend/dist).
    # ------------------------------------------------------------------
    location / {
        root /var/www/scopio/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Prevent the browser from caching index.html so users always
        # get the latest SPA shell after a deployment.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}

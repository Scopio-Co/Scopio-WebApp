# Nginx reverse proxy for Django (Gunicorn) + HTTPS termination

upstream scopio_gunicorn {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name scopio.in www.scopio.in;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name scopio.in www.scopio.in;

    # Replace with your cert paths (e.g. Certbot)
    ssl_certificate /etc/letsencrypt/live/scopio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scopio.in/privkey.pem;

    client_max_body_size 25m;

    # Video stream endpoint: disable buffering so seeks start returning bytes immediately.
    location ~ ^/api/video/lessons/[0-9]+/stream/?$ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }

    # API requests: forward to Django backend (keeps /api/ prefix for Django routing)
    # Django URLs expect /api/ prefix (e.g., /api/auth/status/ → main/urls.py path('api/', ...))
    location /api/ {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        
        # Let Django's django-cors-headers handle all CORS responses
        # Don't add any CORS headers here to avoid conflicts
    }

    # All other requests (OAuth, admin, root redirects, etc.)
    location / {
        proxy_pass http://scopio_gunicorn;
        proxy_http_version 1.1;
        proxy_intercept_errors off;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    location /static/ {
        alias /var/www/scopio/Backend/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /media/ {
        alias /var/www/scopio/storage/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
